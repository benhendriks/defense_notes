site_name: BTL1 Field Notes
site_description: >-
  Practical field reference for the Security Blue Team BTL1 certification
  and SOC Tier 1 operations. Real commands, real workflows, no fluff.
site_url: https://nervi0z.github.io/btl1-field-notes/
site_author: Nervi0z
repo_name: Nervi0z/btl1-field-notes
repo_url: https://github.com/Nervi0z/btl1-field-notes
edit_uri: edit/main/docs/

copyright: >
  <a href="https://github.com/Nervi0z">@Nervi0z</a> &middot; Security Analyst &middot; VAR Group Madrid

theme:
  name: material
  custom_dir: docs/overrides
  logo: assets/logo.svg
  favicon: assets/logo.svg

  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

  font:
    text: Inter
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - header.autohide

  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/custom.css

extra_javascript:
  - assets/custom.js

plugins:
  - search:
      lang: en
  - glightbox
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Nervi0z
      name: Nervi0z on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/miguel-alameda
      name: LinkedIn
  generator: false

nav:
  - Home: index.md

  - Introduction:
    - 00_Introduction_BTL1/index.md
    - What is BTL1: 00_Introduction_BTL1/01_What_is_BTL1.md
    - Exam Philosophy: 00_Introduction_BTL1/02_Exam_Philosophy.md
    - General Strategy: 00_Introduction_BTL1/03_General_Strategy.md
    - My BTL1 Experience: 00_Introduction_BTL1/04_My_BTL1_Experience.md

  - Phishing Analysis:
    - 01_Phishing_Analysis/index.md
    - Key Concepts: 01_Phishing_Analysis/01_Key_Concepts.md
    - Tools: 01_Phishing_Analysis/02_Tools.md
    - Commands Cheatsheet: 01_Phishing_Analysis/03_Commands_Cheatsheet.md
    - Analysis Workflow: 01_Phishing_Analysis/04_Analysis_Workflow.md
    - Practice Resources: 01_Phishing_Analysis/05_Practice_Resources.md

  - Threat Intelligence:
    - 02_Threat_Intelligence/index.md
    - Key Concepts: 02_Threat_Intelligence/01_Key_Concepts.md
    - MITRE ATT&CK: 02_Threat_Intelligence/02_MITRE_ATTACK.md
    - Tools: 02_Threat_Intelligence/03_Tools.md
    - IOC Workflow: 02_Threat_Intelligence/04_IoC_Workflow.md
    - Practice Resources: 02_Threat_Intelligence/05_Practice_Resources.md

  - Digital Forensics:
    - 03_Digital_Forensics/index.md
    - Acquisition: 03_Digital_Forensics/01_Acquisition.md
    - Disk Analysis:
      - Overview: 03_Digital_Forensics/02_Disk_Analysis/README.md
      - Disk Tools: 03_Digital_Forensics/02_Disk_Analysis/Disk_Tools.md
      - File Carving: 03_Digital_Forensics/02_Disk_Analysis/File_Carving_Scalpel.md
      - Linux Artifacts: 03_Digital_Forensics/02_Disk_Analysis/Linux_Artifacts.md
      - Metadata ExifTool: 03_Digital_Forensics/02_Disk_Analysis/Metadata_ExifTool.md
      - Windows Artifacts: 03_Digital_Forensics/02_Disk_Analysis/Windows_Artifacts.md
    - Memory Analysis:
      - Overview: 03_Digital_Forensics/03_Memory_Analysis/README.md
      - Key Concepts: 03_Digital_Forensics/03_Memory_Analysis/Key_Concepts.md
      - Volatility: 03_Digital_Forensics/03_Memory_Analysis/Volatility_Tool.md
    - Practice Resources: 03_Digital_Forensics/04_Practice_Resources.md

  - SIEM Analysis:
    - 04_SIEM_Analysis/index.md
    - Key Concepts: 04_SIEM_Analysis/01_Key_Concepts.md
    - Splunk Cheatsheet: 04_SIEM_Analysis/02_Splunk_Cheatsheet.md
